# Bootstrap configuration for the dedicated installation-operator host.
# Certbot updates the installed runtime copy; do not reinstall this file after TLS setup.
server {
    listen 80;
    listen [::]:80;
    server_name ops.setly.tech;

    root /opt/padel-park-qr-scanner/client/dist;
    index index.html;
    client_max_body_size 1m;

    if ($host != ops.setly.tech) {
        return 444;
    }

    location = / {
        return 302 /installation;
    }

    location = /installation {
        try_files /index.html =404;
    }

    location = /installation/provisioning {
        try_files /index.html =404;
    }

    location ~ ^/api/installation/provisioning/(status|session|snapshot|organizations(?:/[^/]+/activation/reissue)?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_read_timeout 300s;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location = /favicon.ico {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
