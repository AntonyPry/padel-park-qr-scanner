# Bootstrap configuration for the first TLS certificate issuance.
# Certbot updates the installed runtime copy; do not reinstall this file after TLS setup.
map $uri $setly_safe_request_uri {
    default $uri;
    ~*^/api/integrations/beeline/events(?:/|$) /api/integrations/beeline/events/[redacted];
}

log_format setly_redacted '$remote_addr - $remote_user [$time_local] '
                          '"$request_method $setly_safe_request_uri $server_protocol" '
                          '$status $body_bytes_sent "$http_user_agent"';

server {
    listen 80;
    listen [::]:80;
    server_name setly.tech www.setly.tech;

    root /opt/padel-park-qr-scanner/client/dist;
    index index.html;
    client_max_body_size 64m;
    access_log /var/log/nginx/access.log setly_redacted;

    # Installation-operator UI is served only by ops.setly.tech.
    location = /installation {
        return 404;
    }

    location ^~ /installation/ {
        return 404;
    }

    # Keep public owner activation on the product host, but deny operator APIs.
    location ~ ^/api/installation/provisioning/(status|session|snapshot|organizations(?:/|$)) {
        return 404;
    }

    # Callback identity, capability and attacker-controlled query values are sensitive.
    # Nginx error_log cannot redact request/upstream URIs, so suppress route-local errors.
    location ~* ^/api/integrations/beeline/events(?:/|$) {
        error_log /dev/null crit;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
