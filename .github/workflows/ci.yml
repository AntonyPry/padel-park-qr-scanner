name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  server:
    name: Server checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DB_NAME: padel_park_test
      DB_PASSWORD: root
      DB_USER: root
      NODE_ENV: test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: padel_park_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run migrations
        run: npx sequelize-cli db:migrate --env test
      - name: Unit tests
        run: npm run test
      - name: Generate OpenAPI
        run: npm run openapi
      - name: Check generated API drift
        working-directory: .
        run: git diff --exit-code -- docs/openapi.json client/src/api/generated.ts

  client:
    name: Client checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
